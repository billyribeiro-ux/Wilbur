name: Whiteboard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      WB_FPS_MIN: 55
      WB_LATENCY_MS_MAX: 16
      WB_UNDO_MS_MAX: 10
      WB_MEM_MB_MAX: 120
      CI: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run TypeScript check
        run: npm run typecheck
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Run component tests
        run: npm run test:component
      
      - name: Run E2E tests
        run: npm run test:wb:e2e
      
      - name: Run performance budget tests
        run: npm run test:wb:perf
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            playwright-report-whiteboard/
            coverage/
          retention-days: 30
      
      - name: Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-metrics
          path: playwright-report-whiteboard/
          retention-days: 30
